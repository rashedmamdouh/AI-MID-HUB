services:
  - type: web
    name: ai-medical-hub
    runtime: python
    plan: free
    region: frankfurt   # closest to Egypt; change if you prefer oregon/singapore/ohio
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: HF_API_KEY
        sync: false            # set manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false            # set manually in Render dashboard
      - key: EMBEDDING_MODEL_NAME
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: VECTOR_STORE_PATH
        value: ./rag/vector_store/knowledge_base.index
      - key: CHUNKS_STORE_PATH
        value: ./rag/vector_store/chunks.json
      - key: TRANSFORMERS_CACHE
        value: /tmp/hf_cache
      - key: HF_HOME
        value: /tmp/hf_cache
